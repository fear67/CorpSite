<!DOCTYPE html>
{% load static %}
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный сайт</title>
    <link rel="stylesheet" href="{% static 'CorpSiteProject/css/eventcreate.css' %}">
</head>

{% block content %}
<div class="form-page">
    <div class="form-container">
        <a href="{% url 'Events' %}" class="back-link">Назад к мероприятиям</a>
        
        <h1>{{ title }}</h1>
        
        <!-- ВАЖНО: enctype="multipart/form-data" ОБЯЗАТЕЛЬНО -->
        <form method="post" enctype="multipart/form-data" class="event-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Название мероприятия</label>
                <input type="text" name="title" class="form-input" required>
            </div>
            
            <div class="form-group">
                <label>Описание</label>
                <textarea name="text" class="form-textarea" rows="6" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Дата и время</label>
                <input type="datetime-local" name="date" class="form-input" required>
            </div>
            
            <!-- ПРОСТОЙ ИНПУТ ДЛЯ ФАЙЛОВ -->
            <div class="form-group">
                <label>Фотографии (можно выбрать несколько)</label>
                <input type="file" name="photos" multiple accept="image/*" class="form-input">
                <small class="upload-hint">Зажмите Ctrl (или Cmd на Mac) чтобы выбрать несколько файлов</small>
            </div>
            
            <div class="form-buttons">
                <button type="submit" class="btn-submit">Создать мероприятие</button>
                <button type="reset" class="btn-reset">Очистить</button>
            </div>
        </form>
    </div>
</div>

<style>

</style>
{% endblock %}
