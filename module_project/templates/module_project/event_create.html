<!DOCTYPE html>
{% load static %}
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный сайт</title>
    <link rel="stylesheet" href="{% static 'CorpSiteProject/css/style.css' %}">
</head>

{% block content %}
<div class="form-page">
    <div class="form-container">
        <a href="{% url 'Events' %}" class="back-link">Назад к мероприятиям</a>
        
        <h1>{{ title }}</h1>
        
        <!-- ВАЖНО: enctype="multipart/form-data" ОБЯЗАТЕЛЬНО -->
        <form method="post" enctype="multipart/form-data" class="event-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Название мероприятия</label>
                <input type="text" name="title" class="form-input" required>
            </div>
            
            <div class="form-group">
                <label>Описание</label>
                <textarea name="text" class="form-textarea" rows="6" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Дата и время</label>
                <input type="datetime-local" name="date" class="form-input" required>
            </div>
            
            <!-- ПРОСТОЙ ИНПУТ ДЛЯ ФАЙЛОВ -->
            <div class="form-group">
                <label>Фотографии (можно выбрать несколько)</label>
                <input type="file" name="photos" multiple accept="image/*" class="form-input">
                <small class="upload-hint">Зажмите Ctrl (или Cmd на Mac) чтобы выбрать несколько файлов</small>
            </div>
            
            <div class="form-buttons">
                <button type="submit" class="btn-submit">Создать мероприятие</button>
                <button type="reset" class="btn-reset">Очистить</button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-page {
        min-height: 100vh;
        background: #eeeeee;
        padding: 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .form-container {
        max-width: 800px;
        width: 100%;
        background: white;
        border-radius: 20px;
        padding: 2rem;
        border: 1px solid #e8e8e8;
    }
    
    .back-link {
        display: inline-block;
        margin-bottom: 1.5rem;
        color: #7a7a7a;
        text-decoration: none;
    }
    
    .form-container h1 {
        font-size: 1.8rem;
        font-weight: 400;
        margin-bottom: 2rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #e8e8e8;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: #4a4a4a;
    }
    
    .form-input, .form-textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #d0d0d0;
        border-radius: 12px;
        font-size: 1rem;
        font-family: inherit;
        box-sizing: border-box;
    }
    
    .form-input:focus, .form-textarea:focus {
        outline: none;
        border-color: #2c2c2c;
    }
    
    .form-textarea {
        resize: vertical;
    }
    
    .upload-hint {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.8rem;
        color: #9a9a9a;
    }
    
    .form-buttons {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }
    
    .btn-submit, .btn-reset {
        padding: 12px 24px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
    }
    
    .btn-submit {
        background: #2c2c2c;
        color: white;
    }
    
    .btn-submit:hover {
        background: #1a1a1a;
    }
    
    .btn-reset {
        background: #f0f0f0;
        color: #4a4a4a;
        border: 1px solid #d0d0d0;
    }
    
    .btn-reset:hover {
        background: #e0e0e0;
    }
</style>
{% endblock %}
