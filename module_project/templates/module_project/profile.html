<!DOCTYPE html>
{% load static %}
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="{% static 'CorpSiteProject/css/profile.css' %}">
    
    <!-- ===== ПОДКЛЮЧАЕМ LIGHTBOX ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
</head>

<body>
    <header class="header" style="display: flex; ">
        <a href="{% url 'Home' %}" class="home-btn">На главную</a>
        <form action="{% url 'logout' %}" method="post" style="margin-left: auto;">
            {% csrf_token %}
            <button type="submit" style="background: none; border: none; cursor: pointer; text-decoration: none; font-size: 1.3rem;">
                <a class="home-btn">Выйти</a>
            </button>
        </form>
    </header>
    <main>
        <section class="settings-section">
            <div class="form-container">
                <form class="profile-form" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <!-- Контейнер для загрузки аватарки -->
                    <div class="avatar-container">
                        <div class="avatar-preview">
                            {% if user.profile.avatar %}
                                <a href="{{ user.profile.avatar.url }}" data-lightbox="avatar" data-title="Аватар пользователя">
                                    <img id="avatar-image" src="{{ user.profile.avatar.url }}" alt="Аватар">
                                </a>
                            {% else %}
                                <img id="avatar-image" src="/static/CorpSiteProject/images/default_avatar.png" alt="Аватар по умолчанию">
                            {% endif %}
                        </div>
                        <label for="avatar-input" class="avatar-label">Выбрать фото</label>
                        <input type="file" id="avatar-input" name="avatar" accept="image/*">
                    </div>

                    <!-- Поля ввода данных -->
                    <div class="form-group">
                        <label for="user-lastname">Фамилия</label>
                        <input type="text" id="user-lastname" name="lastname" placeholder="Введите фамилию" value="{{ user.profile.lastname|default:'' }}" required>
                    </div>

                    <div class="form-group">
                        <label for="user-firstname">Имя</label>
                        <input type="text" id="user-firstname" name="firstname" placeholder="Введите имя" value="{{ user.profile.firstname|default:'' }}" required>
                    </div>

                    <div class="form-group">
                        <label for="user-patronymic">Отчество</label>
                        <input type="text" id="user-patronymic" name="patronumic" placeholder="Введите отчество" value="{{ user.profile.patronumic|default:'' }}">
                    </div>

                    <div class="form-group">
                        <label for="user-phone">Телефон</label>
                        <input type="tel" id="user-phone" name="phone_number" placeholder="+7 (999) 999-99-99" value="{{ user.profile.phone_number|default:'' }}" required>
                    </div>

                    <button type="submit" class="save-btn">Сохранить изменения</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
